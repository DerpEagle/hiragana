<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Sentence Audio</title>
  <style>
    body { font-family: system-ui; background: #1a1a2e; color: #e0e0e0; padding: 1rem; }
    h1 { color: #00d4ff; font-size: 1.3rem; }
    .row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid #333; }
    .row:hover { background: #222; }
    .jp { font-size: 1.2rem; flex: 1; }
    .num { color: #888; width: 2rem; text-align: right; }
    button { background: #0f3460; color: #fff; border: none; border-radius: 6px; padding: 0.4rem 0.8rem; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #1a5276; }
    button:active { background: #00d4ff; color: #000; }
  </style>
</head>
<body>
  <h1>Test: Sentence Audio (50)</h1>
  <div id="list"></div>
  <script>
    const sentences = [
      "これはほんです",
      "それはペンです",
      "わたしはがくせいです",
      "あなたはせんせいです",
      "かれはにほんじんです",
      "かのじょはいしゃです",
      "これはねこです",
      "あれはやまです",
      "ここはがっこうです",
      "きょうはげつようびです",
      "みずをのみます",
      "ごはんをたべます",
      "ほんをよみます",
      "おんがくをききます",
      "テレビをみます",
      "がっこうにいきます",
      "うちにかえります",
      "ここにすわります",
      "でんしゃでいきます",
      "にほんごではなします",
      "わたしはにほんごをべんきょうします",
      "わたしはまいにちコーヒーをのみます",
      "かれはしんぶんをよみます",
      "わたしはあさごはんをたべます",
      "かのじょはえいごをはなします",
      "ともだちはとうきょうにすんでいます",
      "わたしはまいにちにほんごをれんしゅうします",
      "せんせいはがっこうでおしえます",
      "わたしはでんしゃでしごとにいきます",
      "こどもたちはこうえんであそびます",
      "このほんはおもしろいです",
      "きょうはあついです",
      "にほんごはむずかしいです",
      "このりょうりはおいしいです",
      "さくらはきれいです",
      "わたしはさかなをたべません",
      "かれはにほんごをはなしません",
      "きょうはさむくないです",
      "このえいがはおもしろくないです",
      "あのレストランはしずかではありません",
      "きのうえいがをみました",
      "あさごはんをたべました",
      "にほんにいきました",
      "ともだちにあいました",
      "きのうべんきょうしませんでした",
      "あめがふっています",
      "いまテレビをみています",
      "かれはもうかえりました",
      "わたしはまだたべていません",
      "にほんごをはなすことができます",
    ];

    const list = document.getElementById("list");
    sentences.forEach((s, i) => {
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML =
        '<span class="num">' + (i + 1) + '</span>' +
        '<button onclick="play(this, \'' + s + '\')">&#9654;</button>' +
        '<span class="jp">' + s + '</span>';
      list.appendChild(row);
    });

    let current = null;
    function play(btn, text) {
      if (current) { current.pause(); current = null; }
      current = new Audio("audio/" + encodeURIComponent(text) + ".mp3");
      current.addEventListener("ended", () => { current = null; });
      current.play();
    }
  </script>
</body>
</html>
