<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Japanese Number Trainer — Learn to Count in Japanese</title>
    <meta name="description" content="Learn Japanese numbers with an interactive trainer. Practice counting in Japanese with instant feedback.">
    <meta name="keywords" content="japanese numbers, count in japanese, japanese number practice, japanske tall, lær japanske tall">
    <meta property="og:title" content="Japanese Number Trainer — Learn to Count in Japanese">
    <meta property="og:description" content="Learn Japanese numbers with an interactive trainer. Practice counting in Japanese.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://derpeagle.github.io/hiragana/tall.html">
    <meta property="og:image" content="https://derpeagle.github.io/hiragana/icons/icon-512.png">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="theme.js"></script>
    <style>
      /* Numbers can have many characters — use smaller font and allow line breaks */
      #hiragana-character.hiragana {
        font-size: clamp(2rem, 7vw, 3.5rem);
        white-space: normal;
        word-break: break-word;
        overflow-wrap: anywhere;
        line-height: 1.3;
      }
    </style>
    <script data-goatcounter="https://derpeagle.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f3460">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
  </head>

  <body>
    <div class="container">
      <header>
        <a href="index.html" class="back-link" data-i18n="back">←</a>
        <h1 data-i18n="tall-title">Øv på tall:</h1>
      </header>

      <main>
        <section class="mode-section">
          <div class="range-inputs">
            <label class="range-label-group">
              <span data-i18n="from-label">Fra</span>
              <input
                type="number"
                id="from-input"
                min="0"
                max="999999999999"
                value="0"
              />
            </label>
            <span class="range-dash">–</span>
            <label class="range-label-group">
              <span data-i18n="to-label">til</span>
              <input
                type="number"
                id="to-input"
                min="0"
                max="999999999999"
                value="9"
              />
            </label>
          </div>
          <span class="range-count" id="range-count"></span>
          <div class="script-toggle">
            <button class="script-btn script-btn--active" data-dir="jp-to-num">
              日→123
            </button>
            <button class="script-btn" data-dir="num-to-jp">
              123→日
            </button>
            <button class="script-btn" data-dir="mixed">
              ↔
            </button>
          </div>
        </section>

        <section class="training-area">
          <div class="character-display">
            <div id="hiragana-character" class="hiragana">—</div>
            <div id="translation-display" class="translation-always"></div>
          </div>

          <div class="input-area">
            <input
              type="text"
              id="answer-input"
              data-i18n="tall-placeholder"
              placeholder="Skriv romanji eller tall..."
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
            />
            <div id="hint-display" class="hint hidden"></div>
          </div>

          <div class="controls">
            <button id="next-btn" data-i18n="next">Neste →</button>
            <button id="show-answer-btn" data-i18n="show-answer">
              Vis svar
            </button>
          </div>
        </section>
      </main>
    </div>

    <script src="lang.js"></script>
    <script src="streak.js"></script>
    <script src="tall.js"></script>
    <script>
      if ('serviceWorker' in navigator)
        navigator.serviceWorker.register('./sw.js');
    </script>
  </body>
</html>
