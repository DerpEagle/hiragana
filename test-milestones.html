<!doctype html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Milestones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="theme.js"></script>
  <style>
    .test-grid { display: flex; flex-direction: column; gap: 0.75rem; max-width: 400px; margin: 2rem auto; padding: 0 1rem; }
    .test-grid h2 { color: var(--accent); font-size: 1.1rem; margin-top: 1rem; }
    .test-btn { background: var(--bg-card-solid); border: 1px solid var(--border-accent-soft); color: var(--fg); border-radius: 8px; padding: 0.6rem 1rem; cursor: pointer; text-align: left; font-size: 0.95rem; }
    .test-btn:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="back-link">←</a>
      <h1>Test Milestones</h1>
    </header>
    <div class="test-grid" id="buttons"></div>
  </div>

  <script src="lang.js"></script>
  <script src="streak.js"></script>
  <script src="trainer-core.js"></script>
  <script>
    const tests = [
      { title: "3 dager på rad", sub: "Aktivitetsrekord!", label: "⭐ 3 dager streak", tier: 1 },
      { title: "7 dager på rad", sub: "Aktivitetsrekord!", label: "⭐ 7 dager streak", tier: 1 },
      { title: "30 dager på rad", sub: "Aktivitetsrekord!", label: "🏆 30 dager streak", tier: 2 },
      { title: "100 dager på rad", sub: "Aktivitetsrekord!", label: "👑 100 dager streak", tier: 3 },
      { title: "365 dager på rad", sub: "Aktivitetsrekord!", label: "👑 365 dager streak", tier: 3 },
      { title: "Hiragana 100%!", sub: "Alt mestret!", label: "👑 Hiragana 100%", tier: 3 },
      { title: "Katakana 100%!", sub: "Alt mestret!", label: "👑 Katakana 100%", tier: 3 },
      { title: "50 riktige svar", sub: "Godt øvd!", label: "⭐ 50 svar", tier: 1 },
      { title: "100 riktige svar", sub: "Godt øvd!", label: "⭐ 100 svar", tier: 1 },
      { title: "500 riktige svar", sub: "Godt øvd!", label: "🏆 500 svar", tier: 2 },
      { title: "1000 riktige svar", sub: "Godt øvd!", label: "👑 1000 svar", tier: 3 },
      { title: "5000 riktige svar", sub: "Godt øvd!", label: "👑 5000 svar", tier: 3 },
    ];

    if (typeof MilestoneTracker === "undefined") {
      console.error("MilestoneTracker not loaded — check trainer-core.js");
    }

    // mock start time: 12 days ago
    if (!localStorage.getItem(MilestoneTracker.START_KEY)) {
      localStorage.setItem(MilestoneTracker.START_KEY, (Date.now() - 12 * 86400000).toString());
    }

    const container = document.getElementById("buttons");
    tests.forEach((item) => {
      const btn = document.createElement("button");
      btn.className = "test-btn";
      btn.textContent = item.label;
      btn.addEventListener("click", () => {
        MilestoneTracker._showCelebration(item.title, item.sub, item.tier);
      });
      container.appendChild(btn);
    });

    // mastery test with mock stats
    const mockTracker = new ProgressTracker();
    const mockChars = [
      { char: "あ", romanji: ["a"], correct: 25, incorrect: 1 },
      { char: "い", romanji: ["i"], correct: 22, incorrect: 0 },
      { char: "う", romanji: ["u"], correct: 20, incorrect: 3 },
      { char: "え", romanji: ["e"], correct: 18, incorrect: 8 },
      { char: "お", romanji: ["o"], correct: 15, incorrect: 2 },
      { char: "か", romanji: ["ka"], correct: 12, incorrect: 0 },
      { char: "き", romanji: ["ki"], correct: 14, incorrect: 5 },
      { char: "く", romanji: ["ku"], correct: 10, incorrect: 1 },
      { char: "け", romanji: ["ke"], correct: 11, incorrect: 12 },
      { char: "こ", romanji: ["ko"], correct: 13, incorrect: 0 },
    ];
    mockChars.forEach((c) => {
      mockTracker.initializeCharacter(c.char, c.romanji);
      const p = mockTracker.getProgress(c.char);
      p.correctCount = c.correct;
      p.incorrectCount = c.incorrect;
      p.isMastered = true;
    });

    const masteryBtn = document.createElement("button");
    masteryBtn.className = "test-btn";
    masteryBtn.textContent = "👑 Hiragana 100% (med statistikk)";
    masteryBtn.addEventListener("click", () => {
      MilestoneTracker._showMasteryCelebration("Hiragana", mockTracker);
    });
    container.appendChild(masteryBtn);
  </script>
</body>
</html>
